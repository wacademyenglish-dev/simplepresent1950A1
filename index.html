<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | The 1950s Life (A1)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- WOLF LABS ENGINE V2.0: SUPREME DESIGN --- */
        :root {
            --bg: #050505;
            --surface: rgba(15, 12, 10, 0.85); /* Dark warm glass */
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #1DB954; /* Spotify Green */
            --accent-glow: rgba(29, 185, 84, 0.4);
            --correct: #1DB954;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #B3B3B3;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* Cinematic Background - Vintage / Warm Theme */
            background: linear-gradient(to top, rgba(5,3,2,1) 5%, rgba(5,3,2,0.7) 100%), 
                        url('https://images.unsplash.com/photo-1511884642898-4c92249e20b6?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- AMBIENT ORBS & FLOATING ICONS --- */
        .ambient-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15;
            animation: floatOrb 15s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: #e5a914; bottom: -20%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: #1DB954; top: 40%; left: 40%; opacity: 0.1; animation-delay: -10s; }

        .floating-icon {
            position: absolute; color: #fff; opacity: 0.03; font-size: 10rem;
            animation: floatIcon 25s infinite ease-in-out;
        }
        .fi-1 { top: 15%; left: 8%; animation-duration: 30s; }
        .fi-2 { bottom: 20%; right: 10%; font-size: 15rem; animation-duration: 40s; animation-direction: reverse; }

        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
        @keyframes floatIcon { 0% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-50px) rotate(15deg); } 100% { transform: translateY(0) rotate(-10deg); } }

        /* --- LAYOUT FULL-SCREEN --- */
        main {
            flex: 1; width: 100%; max-width: 1200px; margin: 0 auto;
            padding-top: 100px; padding-bottom: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }
        
        .step {
            position: absolute; width: 100%; max-width: 900px;
            opacity: 0; pointer-events: none; transform: scale(0.96);
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden;
            max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step::-webkit-scrollbar { width: 4px; }
        .step::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .step.active {
            opacity: 1; pointer-events: auto; transform: scale(1);
            visibility: visible; position: relative;
        }

        /* --- GLASSMORPHISM PANELS (PREMIUM) --- */
        .glass-panel {
            background: linear-gradient(135deg, rgba(20,18,15,0.85) 0%, rgba(10,8,5,0.95) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            padding: 50px;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .dual-panel { display: flex; gap: 50px; align-items: center; width: 100%; }
        .dual-panel > * { flex: 1; }
        .divider { width: 2px; height: 200px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent); }
        @media (max-width: 850px) { .dual-panel { flex-direction: column; gap: 30px; } .divider { display: none; } }

        /* --- TYPOGRAPHY & BUTTONS --- */
        h1, h2, h3 { font-family: var(--font-display); letter-spacing: 2px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px;}
        h1 { font-size: 4.5rem; line-height: 1.1; color: #fff; }
        h2 { font-size: 2.2rem; color: var(--accent); display: flex; align-items: center; gap: 15px;}
        p { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.7;}

        .btn {
            padding: 18px 45px; border: none; border-radius: 500px; font-family: var(--font-body);
            font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px) scale(1.02); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- SPEAKING HUB (V2.0 EXACT SPEC) --- */
        .speaking-hub {
            margin-top: 40px; padding: 35px; background: rgba(29, 185, 84, 0.08);
            border-radius: 16px; border: 1px solid var(--accent-glow); position: relative;
            box-shadow: inset 0 0 20px rgba(29, 185, 84, 0.05);
        }
        .speaking-hub::before {
            content: '🎙️ SPEAKING HUB'; position: absolute; top: -14px; left: 30px;
            background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem;
            font-weight: 900; padding: 6px 16px; border-radius: 500px; letter-spacing: 2px;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.3rem; margin-bottom: 15px; }
        
        .speaking-starters-container { display: flex; flex-wrap: wrap; gap: 12px; }
        .speaking-starter {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff; padding: 10px 22px; border-radius: 500px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; user-select: none;
        }
        .speaking-starter:hover, .speaking-starter.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        /* --- INTERACTIVE MODULES --- */
        .list-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .list-item {
            padding: 20px 30px; background: rgba(255,255,255,0.03); border-radius: 12px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; color: #fff;
        }
        .list-item:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateX(10px); }

        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 16px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .choice-card:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.4);}
        .choice-card h3 { font-family: var(--font-body); font-size: 1.4rem; margin-bottom: 10px; color: #fff;}
        .choice-card p { font-size: 1rem; color: #ccc; margin: 0;}
        .choice-card i { font-size: 3rem; color: var(--accent); display: block; margin-bottom: 15px; transition: transform 0.3s;}
        .choice-card:hover i { transform: scale(1.1); }

        .vocab-word { color: var(--accent); font-weight: 800; cursor: pointer; border-bottom: 2px dashed var(--accent); padding-bottom: 2px; transition: 0.3s;}
        .vocab-word:hover { color: #fff; border-color: #fff; text-shadow: 0 0 15px var(--accent-glow);}

        /* Text Analysis Blocks */
        .text-reading { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 1.25rem; line-height: 1.8; color: #EBEBEB;}
        .highlight-zone { padding: 35px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; font-size: 1.5rem; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}

        /* Error Finder */
        .error-sentence { font-size: 1.8rem; word-spacing: 5px; line-height: 2; font-weight: 600; text-align: center;}
        .error-word { display: inline-block; padding: 6px 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);}

        /* SENTENCE BUILDER (V2.0 EXACT SPEC) */
        .drop-zone { min-height: 120px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 12px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.4); transition: 0.3s;}
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 30px rgba(29,185,84,0.15); }
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        
        .word-chip { 
            padding: 14px 28px; background: var(--accent); border-radius: 500px; 
            cursor: pointer; user-select: none; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-weight: 800; 
            border: none; color: #000; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3);
        }
        .word-chip:hover { filter: brightness(1.1); transform: translateY(-4px); box-shadow: 0 8px 20px rgba(29, 185, 84, 0.4); }
        .word-chip:active { transform: scale(0.95); }
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Chat Scenario */
        .chat-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px;}
        .msg { padding: 18px 25px; border-radius: 20px; max-width: 85%; font-size: 1.15rem; line-height: 1.5; text-align: left; position: relative;}
        .msg.friend { background: #282828; align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 700; box-shadow: 0 5px 15px var(--accent-glow);}
        .msg-name { font-size: 0.8rem; font-weight: 800; color: var(--accent); letter-spacing: 1px; display: block; margin-bottom: 5px; text-transform: uppercase;}
        .msg.you .msg-name { color: #121212; }
        .chat-option { padding: 18px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; color:#fff; font-weight:700;}
        .chat-option:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateX(5px); }

        /* Memory Minigame */
        .memory-box { display: flex; gap: 15px; justify-content: center; margin: 30px 0; font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: 4px; text-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .memory-btn { width: auto; padding: 15px 25px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .memory-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); border-color: var(--accent);}

        /* Toggle Rows (Fact Check) */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 25px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; font-weight: 600; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; color: #fff;}
        .toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 30px; border-radius: 500px; cursor: pointer; font-weight: 800; transition: 0.3s;}
        .toggle-btn:hover { background: rgba(255,255,255,0.15); }
        .toggle-btn.correct { background: var(--correct); color: #000; border-color: var(--correct); }
        .toggle-btn.incorrect { background: var(--incorrect); color: #fff; border-color: var(--incorrect); }

        /* --- THE ARENA (V2.0 EXACT SPEC) --- */
        .arena-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;}
        .arena-card { width: 280px; height: 380px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);}
        .arena-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; border-radius: 24px; }
        .card-front { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 5rem; color: var(--accent); backdrop-filter: blur(10px);}
        .card-back { background: var(--accent); transform: rotateY(180deg); color: #000; border: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .card-back h3 { color: #000; font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 10px; text-shadow: none;}
        .card-back p { color: #121212; font-weight: 600; font-size: 1.1rem; }

        /* Video Wrapper */
        .video-wrapper { position: relative; aspect-ratio: 16/9; width: 100%; max-width: 1000px; margin: 0 auto 30px auto; border-radius: 16px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);}
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- HEADERS & FOOTERS --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 90px; padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
            background: linear-gradient(to bottom, rgba(5,3,2,0.95), transparent);
        }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; color: #fff; letter-spacing: 3px;}
        .logo span { color: var(--accent); }
        .level-badge { background: var(--accent); color: #000; font-family: var(--font-body); padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 900; margin-left: 10px; letter-spacing: 1px; vertical-align: middle;}

        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 110px; padding: 0 50px;
            background: linear-gradient(to top, rgba(5,3,2,1), rgba(5,3,2,0.8)); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px);
        }

        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); font-size: 1.1rem; }
        .icon-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); border-color: var(--accent);}

        /* --- ASIDE PANELS --- */
        .vocab-panel {
            position: fixed; top: 0; right: -550px; width: 500px; height: 100vh;
            background: linear-gradient(135deg, rgba(20, 15, 10, 0.45) 0%, rgba(10, 8, 5, 0.8) 100%);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 200;
            padding: 80px 50px; border-left: 1px solid rgba(255,255,255,0.15); 
            box-shadow: -30px 0 80px rgba(0,0,0,0.9);
            transition: right 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; gap: 25px; overflow-y: auto;
        }
        .vocab-panel.open { right: 0; }
        .vocab-close { position: absolute; top: 30px; right: 30px; color: #fff; background: transparent; border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s;}
        .vocab-close:hover { background: var(--incorrect); border-color: var(--incorrect); transform: rotate(90deg); }

        .whiteboard-panel { position: fixed; bottom: 110px; right: 40px; width: 450px; height: 500px; background: rgba(10,12,20,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(30px); opacity: 0;}
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-display); font-size: 1.2rem; color: #fff; letter-spacing: 1px;}
        .wb-content { flex: 1; padding: 25px; outline: none; color: var(--accent); font-family: monospace; font-size: 1.2rem; resize: none; border: none; background: transparent; line-height: 1.8;}

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-10px); } 50% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <i class="fa-solid fa-clock floating-icon fi-1"></i>
        <i class="fa-solid fa-house floating-icon fi-2"></i>
    </div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-record-vinyl" style="color:var(--accent); margin-right:8px;"></i> WOLF LABS <span>|</span> THE 1950s LIFE <div class="level-badge">A1</div></div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Live Whiteboard"><i class="fa-solid fa-pen-to-square"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div style="font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; color: var(--text-dim); letter-spacing: 4px;" id="step-counter">SCENE 1 / 26</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT SCENE <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <aside class="vocab-panel" id="vocabPanel">
        <button class="vocab-close" onclick="closeVocab()"><i class="fa-solid fa-xmark"></i></button>
        <div id="asideContent">
            <p class="tag" style="margin-bottom: 5px;"><i class="fa-solid fa-book"></i> A1 DICTIONARY</p>
            <h2 id="vocab-title" style="font-size: 3rem; margin-bottom: 20px; color:#fff;">Term</h2>
            <div class="glass-panel" style="padding: 30px; text-align: left; margin-bottom: 25px; border-radius: 16px;">
                <p style="color: var(--accent); font-weight: 900; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px;">DEFINITION</p>
                <p id="vocab-def" style="color: #fff; margin-bottom: 25px; font-size: 1.2rem; line-height: 1.6;">Definition text here.</p>
                <p style="color: var(--text-dim); font-weight: 900; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px;">EXAMPLE</p>
                <p id="vocab-ex" style="font-style: italic; color: var(--text-dim); font-size: 1.1rem; line-height: 1.6;">"Example sentence here."</p>
            </div>
            <div class="speaking-hub" style="margin-top: 0; background: var(--accent); border-color: var(--accent); box-shadow: 0 10px 30px rgba(29, 185, 84, 0.3);">
                <p id="vocab-speak" style="color:#000; font-weight:800; font-size:1.25rem;">Follow up question?</p>
            </div>
        </div>
    </aside>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-chalkboard" style="color:var(--accent); margin-right: 10px;"></i> Teacher's Board</span><button class="vocab-close" style="position:static; width: 35px; height: 35px;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="Type vocabulary, corrections, or notes here..."></textarea>
    </aside>

    <script>

                <div class="speaking-hub" id="p20" style="display:none; text-align: left; max-width: 800px; margin: 40px auto 0 auto;"><p>Teacher, evaluate "I like..." and basic vocabulary.</p></div>
            </div>`,

            // 21: THE ARENA 2
            `<div>
                <h2 style="text-align:center; font-size:3rem;"><i class="fa-solid fa-trophy"></i> The Arena 2</h2>
                <p style="text-align:center; font-size:1.2rem; margin-bottom: 40px;">More topics!</p>
                <div class="arena-grid">
                    <div class="arena-card" onclick="flipCard(this, 'p21')">
                        <div class="card-inner">
                            <div class="card-front"><i class="fa-solid fa-city"></i></div>
                            <div class="card-back"><h3>City</h3><p>Do you live in a big city or a small town?</p></div>
                        </div>
                    </div>
                    <div class="arena-card" onclick="flipCard(this, 'p21')">
                        <div class="card-inner">
                            <div class="card-front"><i class="fa-solid fa-tv"></i></div>
                            <div class="card-back"><h3>Technology</h3><p>Can you live without your phone for a week?</p></div>
                        </div>
                    </div>
                </div>
                <div class="speaking-hub" id="p21" style="display:none; text-align: left; max-width: 800px; margin: 40px auto 0 auto;"><p>Try to use full sentences!</p></div>
            </div>`,

            // 22: ROLEPLAY
            `<div class="glass-panel" style="text-align:center;">
                <h2><i class="fa-solid fa-masks-theater"></i> Roleplay Time</h2>
                <p>Click the button to generate your character.</p>
                <div class="highlight-zone" id="role-box" style="font-size:2rem; margin:40px 0; font-weight:800; color:var(--accent);">???</div>
                <button class="btn btn-accent" onclick="this.style.display='none'; generateRole('p22')"><i class="fa-solid fa-dice"></i> Generate Scenario</button>
                <div class="speaking-hub" id="p22" style="display:none; text-align: left;"><p>Teacher: Act as a person from 1950. Ask the student about their "modern" life.</p></div>
            </div>`,

            // 23: QUESTION TIME
            `<div class="glass-panel">
                <h2><i class="fa-solid fa-circle-question"></i> Ask the Teacher</h2>
                <p>Use the Simple Present to ask the teacher 3 questions about their routine.</p>
                <div class="highlight-zone" style="text-align: left; padding: 20px;">
                    1. Do you...?<br>
                    2. What time do you...?<br>
                    3. Where do you...?
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p23')">Done</button>
                <div class="speaking-hub" id="p23" style="display:none;"><p>Teacher, answer with full sentences!</p></div>
            </div>`,

            // 24: FINAL TASK
            `<div>
                <h2 style="text-align:center; font-size:3.5rem;"><i class="fa-solid fa-flag-checkered"></i> Final Challenge</h2>
                <p style="text-align:center; font-size:1.3rem;">You have 60 seconds. Talk about your daily routine.</p>
                <div class="choice-grid" style="max-width: 800px; margin: 40px auto;">
                    <div class="choice-card" onclick="genericCorrect(this, false)"><h3><i class="fa-solid fa-hand"></i> I need a second.</h3></div>
                    <div class="choice-card" onclick="genericCorrect(this, true, 'p24')"><h3><i class="fa-solid fa-rocket"></i> I'm ready!</h3></div>
                </div>
                <div class="speaking-hub" id="p24" style="display:none;"><p>Go! "I wake up at... I eat... I work... I live..."</p></div>
            </div>`,

            // 25: END
            `<div class="glass-panel" style="text-align: center; border: 1px solid var(--correct); background: rgba(29, 185, 84, 0.05); padding: 60px;">
                <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: var(--correct); margin-bottom: 20px;"></i>
                <h1 style="color: var(--correct); font-size:4rem; text-shadow:none;">Mission Complete</h1>
                <p style="font-size: 1.4rem; font-weight: 600;">The A1 Training System has been successfully completed.</p>
                <div style="text-align: left; background: rgba(0,0,0,0.5); padding: 40px; border-radius: 16px; margin: 40px auto; max-width: 600px; border: 1px solid rgba(255,255,255,0.1);">
                    <h3 style="color: var(--accent); margin-bottom: 20px; font-size: 1.5rem;"><i class="fa-solid fa-database"></i> Session Data Logged:</h3>
                    <ul style="list-style: none; color: #fff; line-height: 2.2; font-weight: 600; font-size: 1.2rem;">
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:10px;"></i> Vocab: Vintage, Dress, Fridge, Routine</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:10px;"></i> Grammar: Simple Present (I live, She lives)</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:10px;"></i> Speaking: Talk about routines and likes.</li>
                    </ul>
                </div>
            </div>`
        ];

        // --- CORE LOGIC ---
        let currentStep = 0;
        const totalSteps = stepsData.length;
        const mainContainer = document.getElementById('main-container');

        function initializeSteps() {
            mainContainer.innerHTML = '';
            stepsData.forEach((htmlContent, index) => {
                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            const steps = document.querySelectorAll('.step');
            steps.forEach((step, index) => {
                if(index === currentStep) step.classList.add('active');
                else step.classList.remove('active');
            });

            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === steps.length - 1 ? 'none' : 'block';
            document.getElementById('step-counter').innerText = `STEP ${currentStep + 1} / ${steps.length}`;
            
            const pb = document.getElementById('progressBar');
            if (pb) {
                const progress = ((currentStep + 1) / steps.length) * 100;
                pb.style.width = `${progress}%`;
            }
            
            mainContainer.scrollTo(0, 0);
        }

        function nextStep() { 
            const steps = document.querySelectorAll('.step');
            if (currentStep < steps.length - 1) { 
                currentStep++; 
                updateUI(); 
                closeVocab(); 
            } 
        }
        function prevStep() { if (currentStep > 0) { currentStep--; updateUI(); closeVocab(); } }

        function unlockPrompt(id) { const p = document.getElementById(id); if(p) p.style.display = 'block'; }

        function selectCard(card, selector) {
            const parent = card.closest(selector) || card.parentElement;
            parent.querySelectorAll('.choice-card').forEach(el => { el.style.opacity = '0.4'; el.style.borderColor = 'var(--border)'; });
            card.style.opacity = '1'; card.style.borderColor = 'var(--accent)';
        }

        function genericCorrect(btn, isCorrect, promptIdStr) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('div, button, span')).filter(b => b.hasAttribute('onclick') && b.getAttribute('onclick').includes('genericCorrect'));
            const maxAttempts = Math.min(3, options.length - 1);
            let promptIdToUnlock = promptIdStr;

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--correct)';
                if (promptIdToUnlock) unlockPrompt(promptIdToUnlock);
            } else {
                attempts++; parent.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--incorrect)'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (attempts >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    const correctBtn = options.find(b => b.getAttribute('onclick') && b.getAttribute('onclick').includes('true'));
                    if (correctBtn) { correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)'; }
                    if (promptIdToUnlock) setTimeout(() => unlockPrompt(promptIdToUnlock), 500);
                }
            }
        }

        function checkTrueFalse(btn, isCorrect, promptId) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('button'));
            
            if (isCorrect) {
                options.forEach(o => o.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--correct)';
                unlockPrompt(promptId);
            } else {
                attempts++; parent.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--incorrect)'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (attempts >= 1) {
                    options.forEach(o => o.style.pointerEvents = 'none');
                    const correctBtn = options.find(b => b.getAttribute('onclick') && b.getAttribute('onclick').includes('true'));
                    if(correctBtn) { correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)'; }
                    setTimeout(() => unlockPrompt(promptId), 500);
                }
            }
        }

        let buildState = {};
        function moveWord(chip, dzId, targetArray, promptId) {
            if(chip.classList.contains('used')) return;
            const word = chip.innerText;
            const dz = document.getElementById(dzId);
            
            const newChip = document.createElement('div');
            newChip.className = 'word-chip'; 
            newChip.innerText = word;
            
            if (!chip.id) chip.id = 'chip_' + Math.random().toString(36).substr(2, 9);
            newChip.dataset.sourceId = chip.id;
            newChip.onclick = function() {
                if(dz.classList.contains('success')) return;
                dz.removeChild(this);
                document.getElementById(this.dataset.sourceId).classList.remove('used');
                const idx = buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) buildState[dzId].splice(idx, 1);
            };

            dz.appendChild(newChip); chip.classList.add('used');
            if(!buildState[dzId]) buildState[dzId] = [];
            buildState[dzId].push(word);

            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success'); 
                    Array.from(dz.children).forEach(c => { c.style.background = 'var(--correct)'; c.style.color = '#000'; c.style.cursor = 'default'; c.style.borderColor = 'var(--correct)'; });
                    unlockPrompt(promptId);
                } else {
                    let attempts = parseInt(dz.dataset.attempts || '0') + 1;
                    dz.dataset.attempts = attempts;
                    dz.style.borderColor = 'var(--incorrect)'; dz.style.animation = 'shake 0.4s';
                    
                    if (attempts >= 3) {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = ''; dz.style.animation = ''; dz.classList.add('success');
                            targetArray.forEach(w => {
                                const finalChip = document.createElement('div');
                                finalChip.className = 'word-chip'; finalChip.style.background = 'var(--correct)'; finalChip.style.color = '#000'; finalChip.style.borderColor = 'var(--correct)'; finalChip.innerText = w;
                                dz.appendChild(finalChip);
                            });
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.add('used'));
                            setTimeout(() => unlockPrompt(promptId), 500);
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = 'rgba(255,255,255,0.2)'; dz.style.animation = ''; buildState[dzId] = [];
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
                        }, 1000);
                    }
                }
            }
        }

        function handleChat(btn, isCorrect, containerId, promptId) {
            const container = document.getElementById(containerId);
            let attempts = parseInt(container.dataset.attempts || '0');
            const options = Array.from(container.querySelectorAll('.chat-option'));
            const maxAttempts = Math.min(3, options.length - 1);

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.borderColor = 'var(--correct)'; btn.style.background = 'var(--correct)'; btn.style.color = '#000';
                setTimeout(() => { container.innerHTML = `<div class="msg you" style="display:block;">${btn.innerText}</div>`; unlockPrompt(promptId); }, 800);
            } else {
                attempts++; container.dataset.attempts = attempts;
                btn.style.borderColor = 'var(--incorrect)'; btn.style.background = 'rgba(229, 9, 20, 0.15)'; btn.style.color = '#fff'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (attempts >= maxAttempts) {
                    const correctBtn = options.find(b => b.getAttribute('onclick').includes('true'));
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.borderColor = 'var(--correct)'; correctBtn.style.background = 'var(--correct)'; correctBtn.style.color = '#000';
                        setTimeout(() => { container.innerHTML = `<div class="msg you" style="display:block;">${correctBtn.innerText}</div>`; unlockPrompt(promptId); }, 1000);
                    }
                } else {
                    setTimeout(() => { btn.style.animation = ''; btn.style.background = 'rgba(255,255,255,0.05)'; btn.style.borderColor = 'rgba(255,255,255,0.15)'; }, 800);
                }
            }
        }

        let matchS1 = null; let matchesF1 = 0;
        function handleMatch(card, matchVarName, matchesFoundVarName, targetMatches, promptId) {
            if(card.style.opacity === '0') return;
            if(!window[matchVarName]) { window[matchVarName] = card; card.style.borderColor = 'var(--accent)'; }
            else {
                if(window[matchVarName].dataset.val === card.dataset.val && window[matchVarName] !== card) { 
                    window[matchVarName].style.opacity = '0'; card.style.opacity = '0'; 
                    window[matchesFoundVarName]++;
                    if(window[matchesFoundVarName] === targetMatches) unlockPrompt(promptId);
                } else { 
                    window[matchVarName].style.borderColor = 'var(--border)'; card.style.animation = 'shake 0.4s'; 
                    setTimeout(() => card.style.animation = '', 400);
                }
                window[matchVarName] = null;
            }
        }

        let memIndex = 0;
        function startMemoryGame(seqStr) {
            document.getElementById('mem-seq').style.display = 'none'; 
            document.getElementById('mem-start').style.display = 'none'; 
            document.getElementById('mem-test').style.display = 'block';
            memIndex = 0;
            window.currentMemSequence = seqStr.split('|');
        }

        function checkMem(btn, word, seqStr, promptId) {
            const seq = window.currentMemSequence || seqStr.split('|');
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');

            if(word === seq[memIndex]) {
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--correct)'; btn.style.pointerEvents = 'none';
                memIndex++; attempts = 0; parent.dataset.attempts = attempts;
                if(memIndex === seq.length) unlockPrompt(promptId);
            } else {
                attempts++; parent.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.borderColor = 'var(--incorrect)'; btn.style.animation = 'shake 0.4s';
                setTimeout(() => { btn.style.animation = ''; btn.style.backgroundColor = 'rgba(255,255,255,0.05)'; btn.style.borderColor = 'rgba(255,255,255,0.2)'; }, 400);

                if (attempts >= 3) {
                    const correctWord = seq[memIndex];
                    const correctBtn = Array.from(parent.querySelectorAll('.memory-btn')).find(b => b.innerText.trim() === correctWord);
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)'; correctBtn.style.pointerEvents = 'none';
                    }
                    memIndex++; attempts = 0; parent.dataset.attempts = attempts;
                    if(memIndex === seq.length) setTimeout(() => unlockPrompt(promptId), 500);
                }
            }
        }

        function flipCard(card, promptId) {
            card.classList.add('flipped');
            unlockPrompt(promptId);
        }

        const roles = [
            "A teenager from 2024 who loves smartphones.",
            "A person who thinks old things are better.",
            "A journalist asking about life in the 1950s."
        ];
        function generateRole(promptId) {
            document.getElementById('role-box').innerText = roles[Math.floor(Math.random()*roles.length)];
            unlockPrompt(promptId);
        }

        function openVocab(word, promptId) {
            const data = vocabData[word];
            if(data) { 
                document.getElementById('vocab-title').innerText = word; 
                document.getElementById('vocab-def').innerText = data.def; 
                document.getElementById('vocab-ex').innerText = `"${data.ex}"`; 
                document.getElementById('vocab-speak').innerText = data.speak; 
            }
            document.getElementById('vocabPanel').classList.add('open');
            if (promptId) unlockPrompt(promptId);
        }
        function closeVocab() { document.getElementById('vocabPanel').classList.remove('open'); }
        function toggleWhiteboard() { document.getElementById('whiteboardPanel').classList.toggle('open'); }
        function toggleFullscreen() { 
            try {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } 
                else { document.exitFullscreen(); }
            } catch (err) {}
        }

        window.onload = initializeSteps;
    </script>
</body>
</html>
